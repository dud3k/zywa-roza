name: CI

on:
  push:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Instalacja zależności
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Testy
        run: npm test

      - name: Build
        run: npm run build

      - name: Walidacja schematu
        run: npm run validate
